events { worker_connections 1024; }

http {
    upstream backend_server {
        server backend:3000;
    }

    # 1. Redireciona todo o tráfego HTTP (Porta 80) para HTTPS (Porta 443)
    server {
        listen 80;
        server_name localhost;
        
        return 301 https://$host$request_uri;
    }

    # 2. Configuração do Servidor HTTPS (Porta 443)
    server {
        listen 443 ssl;
        server_name localhost;

        # Caminhos dos certificados dentro do container do Nginx
        ssl_certificate /etc/nginx/certs/localhost.crt;
        ssl_certificate_key /etc/nginx/certs/localhost.key;

        # Configurações recomendadas de segurança SSL
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Redireciona as requisições para o NestJS
        location / {
            proxy_pass http://backend_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded-for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Suporte a WebSockets (essencial para o NestJS)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}