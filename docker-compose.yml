services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nestjs_backend
    ports:
      - "3000:3000"
    expose:
      - "3000"
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - NODE_ENV=development
      - DATABASE_HOST=postgres_db
      - DATABASE_PORT=5432
      - DATABASE_USER=root
      - DATABASE_PASSWORD=root_pass
      - DATABASE_NAME=transcendence_db
    networks:
      - transcendence_net

  nginx:
    build:
      context: .
      dockerfile: ./nginx/Dockerfile
    container_name: nginx_proxy
    ports:
      - "80:80"
      - "443:443"
    # Nota: Em produção, você pode remover os volumes abaixo porque o Dockerfile 
    # já copia os arquivos para dentro da imagem. Para desenvolvimento local, 
    # manter o volume do nginx.conf é útil se você quiser alterar o arquivo e ver o resultado na hora.
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - transcendence_net

networks:
  transcendence_net:
    driver: bridge