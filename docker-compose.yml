services:
  backend:
  
  frontend:

  nginx:

  vault:

  grafana:
    image: grafana/grafana
    networks:
      - transcendence
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD} 
    volumes:
      - grafana-db:/var/lib/grafana/grafana.db
    depends_on:
      - prometheus
    restart: unless-stopped
  prometheus:

volumes:
  grafana-db: 
