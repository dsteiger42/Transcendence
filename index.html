<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transcendence</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="navbar">
    <div class="logo">
      <span class="logo-text">Transcendence</span>
      <span class="logo-tag">Beta</span>
    </div>

    <div class="nav-actions">
      <div class="nav-icons">
        <button class="nav-icon-btn" title="Search">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </button>
        <button class="nav-icon-btn" title="Settings">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>
      <div class="nav-divider"></div>
      <div class="nav-balance">
        <span class="nav-balance-label">Balance</span>
        <span class="nav-balance-value" id="navBalance">1,000 T$</span>
      </div>
      <div class="nav-divider"></div>
      <button class="nav-btn nav-btn--ghost">Login</button>
      <button class="nav-btn nav-btn--solid">Register</button>
    </div>
  </nav>

  <main class="page-content">

    <div class="trading-layout">

      <!-- Left: Bet panel -->
      <div class="trading-panel">

        <div class="coin-selector">
          <button class="coin-btn active" data-coin="BTC">BTC</button>
          <button class="coin-btn" data-coin="ETH">ETH</button>
          <button class="coin-btn" data-coin="SOL">SOL</button>
          <button class="coin-btn" data-coin="BNB">BNB</button>
          <button class="coin-btn" data-coin="XRP">XRP</button>
        </div>

        <div class="price-display">
          <span class="price-coin" id="priceCoin">BTC</span>
          <span class="price-value" id="priceValue">$--,---</span>
          <span class="price-change" id="priceChange">--</span>
        </div>

        <div class="coin-stats">
          <div class="stat">
            <span class="stat-label">24H High</span>
            <span class="stat-value up" id="stat24hHigh">--</span>
          </div>
          <div class="stat">
            <span class="stat-label">24H Low</span>
            <span class="stat-value down" id="stat24hLow">--</span>
          </div>
          <div class="stat">
            <span class="stat-label">Volume</span>
            <span class="stat-value" id="statVolume">--</span>
          </div>
        </div>

        <div class="timer-section">
          <div class="timer-top">
            <span class="timer-label" id="timerLabel">Betting window open</span>
            <span class="timer-countdown" id="timerCountdown">0:15</span>
          </div>
          <div class="timer-bar-wrapper">
            <div class="timer-bar" id="timerBar"></div>
          </div>
        </div>

        <div class="bet-section">
          <div class="bet-input-row">
            <label class="bet-label">Bet amount</label>
            <div class="quick-amounts">
              <button class="quick-btn" data-amount="50">50</button>
              <button class="quick-btn" data-amount="100">100</button>
              <button class="quick-btn" data-amount="250">250</button>
              <button class="quick-btn" data-amount="500">500</button>
              <button class="quick-btn" data-amount="max">MAX</button>
            </div>
            <div class="bet-input-wrapper">
              <span class="bet-currency">T$</span>
              <input class="bet-input" id="betAmount" type="number" min="1" value="100" />
            </div>
          </div>

          <div class="payout-info">
            Payout: <span class="payout-multiplier">x1.85</span>
            &nbsp;·&nbsp; Win: <span class="payout-win" id="payoutWin">T$ 185</span>
          </div>

          <div class="bet-buttons">
            <button class="bet-btn bet-up" id="betUp">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <polyline points="18 15 12 9 6 15"/>
              </svg>
              UP
            </button>
            <button class="bet-btn bet-down" id="betDown">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <polyline points="6 9 12 15 18 9"/>
              </svg>
              DOWN
            </button>
          </div>

          <div class="bet-status" id="betStatus"></div>
        </div>

      </div>

      <!-- Right: Active bet + History -->
      <div class="side-panel">

        <div class="active-bets-list" id="activeBetsList"></div>
          <div class="side-panel-title">Active Bet</div>
          <div class="active-bet-row">
            <span class="active-bet-label">Coin</span>
            <span class="active-bet-value" id="activeCoin">--</span>
          </div>
          <div class="active-bet-row">
            <span class="active-bet-label">Direction</span>
            <span class="active-bet-value" id="activeDirection">--</span>
          </div>
          <div class="active-bet-row">
            <span class="active-bet-label">Entry price</span>
            <span class="active-bet-value" id="activeEntry">--</span>
          </div>
          <div class="active-bet-row">
            <span class="active-bet-label">Amount</span>
            <span class="active-bet-value" id="activeAmount">--</span>
          </div>
          <div class="active-bet-row">
            <span class="active-bet-label">Potential win</span>
            <span class="active-bet-value up" id="activePotential">--</span>
          </div>
        </div>

        <div class="history-panel">
          <div class="side-panel-title">Recent Results</div>
          <div class="history-list" id="historyList">
            <div class="history-empty">No bets yet — place your first bet</div>
          </div>
        </div>

      </div>

    </div>

  </main>

  <!-- Toast notification -->
  <div class="toast" id="toast"></div>

  <script src="script.js" defer></script>

</body>
</html>
