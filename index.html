<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transcendence</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="navbar">
    <div class="logo">
      <span class="logo-text">Transcendence</span>
      <span class="logo-tag">Beta</span>
    </div>

    <div class="avatar-btn" id="avatarBtn" title="Your profile" role="button" tabindex="0" aria-haspopup="true" aria-expanded="false">
      <span class="avatar-initials">JD</span>
      <div class="avatar-status"></div>
    </div>

    <div class="dropdown" id="dropdown" role="menu">
      <div class="dropdown-header">
        <div class="dropdown-name">John Doe</div>
        <div class="dropdown-balance">Balance: 1,000 T$</div>
      </div>
      <button class="dropdown-item" role="menuitem">Profile</button>
      <button class="dropdown-item" role="menuitem">History</button>
      <button class="dropdown-item" role="menuitem">Settings</button>
      <div class="dropdown-divider"></div>
      <button class="dropdown-item danger" role="menuitem">Sign out</button>
    </div>
  </nav>

  <main class="page-content">
    <div class="placeholder-line"></div>
    <span class="placeholder-label">Trading interface · coming soon</span>
    <div class="placeholder-line"></div>
  </main>

  <script src="script.js" defer></script>

</body>
</html>
